<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0c0c1e"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8b5cf6"/>
      <stop offset="50%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Gradient border -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="13" ry="13"
        fill="none" stroke="url(#border)" stroke-width="1.5" opacity="0.6"/>

  <!-- V letter -->
  <text
    x="8" y="46"
    font-family="'Inter','Poppins',Arial,sans-serif"
    font-size="36"
    font-weight="800"
    fill="url(#txt)"
    letter-spacing="-2"
  >VH</text>

  <!-- Dot accent -->
  <circle cx="57" cy="50" r="3" fill="#f472b6" opacity="0.9"/>
</svg>
